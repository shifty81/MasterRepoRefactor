[agent]
max_iterations = 20
default_llm_backend = "ollama"

[auth]
# Set enabled = true and provide username/password to protect all API endpoints
enabled = false
username = ""
password = ""

[llm.ollama]
base_url = "http://localhost:11434"
model = "llama3"

[llm.api]
base_url = "https://api.openai.com"
key = ""
model = "gpt-4o"

[llm.openwebui]
base_url = "http://localhost:3000"
key = ""
model = ""

[llm.localai]
base_url = "http://localhost:8080"
key = ""
model = "codestral"

[llm.local]
model_path = "models/model.gguf"

[llm.embedded]
# In-process GGUF inference via llama-cpp-python — no external server required.
# Install: pip install llama-cpp-python
# GPU (CUDA): pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cu124
model_path     = "models/model.gguf"  # relative to AtlasAI Engine/ or absolute
auto_configure = true                  # auto-detect RAM/VRAM/CPU and tune parameters
n_ctx          = 0                     # 0 = auto (hardware-adaptive); or set explicitly e.g. 4096
n_gpu_layers   = -2                    # -2 = auto; -1 = all layers on GPU; 0 = CPU only
n_threads      = 0                     # 0 = auto; or set explicitly e.g. 8
chat_format    = "auto"                # "auto" detects from filename; or "chatml"/"llama-2" etc.
verbose        = false

[llm.lmstudio]
base_url = "http://localhost:1234"
model = ""

[llm.llamacpp]
base_url = "http://localhost:8080"
model = ""

[llm.tabby]
base_url = "http://localhost:8080"
key = ""
model = ""

[llm.anthropic]
key = ""
model = "claude-3-5-sonnet-20241022"

[llm.gemini]
key = ""
model = "gemini-2.0-flash"

[llm.codegeex]
# CodeGeeX local inference server (OpenAI-compatible API)
# Start with: codegeex-server --model codegeex-4-all-9b --port 8082
base_url = "http://localhost:8082"
key = ""
model = "codegeex-4-all-9b"

[permissions]
allowed_dirs = ["workspace", "projects", "cache", "logs"]
blocked_dirs = ["configs", "core", "llm"]

[server]
host = "127.0.0.1"
port = 8001

[build]
default_system = "cmake"

[cache]
max_size_mb = 512

[ai_persona]
# Built-in persona names:
#   senior_developer, software_architect, frontend_developer, backend_developer,
#   database_engineer, mobile_developer, devops_engineer, security_auditor,
#   test_engineer, code_reviewer, performance_engineer, documentation_writer, ai_ml_engineer
active = ""

[web_search]
# Web search augmentation for the local AI — no API key required.
# When enabled, /ai/web-ask and /ai/chat/web fetch live search results and
# inject them as context into the local LLM's prompt.
enabled     = true
provider    = "duckduckgo"   # "duckduckgo" (no API key) | "searxng" (self-hosted)
max_results = 5              # number of search results to retrieve per query
timeout_s   = 8              # HTTP timeout for each search request (seconds)
searxng_url = ""             # required only when provider = "searxng", e.g. "http://localhost:8080"
