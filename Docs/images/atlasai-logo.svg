<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <!-- Dark tech background -->
    <linearGradient id="ai_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c14"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#060c14"/>
    </linearGradient>
    <!-- Cyan accent gradient (AI/tech) -->
    <linearGradient id="ai_cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="50%" style="stop-color:#48cae4"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="ai_title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48cae4"/>
      <stop offset="35%" style="stop-color:#90e0ef"/>
      <stop offset="65%" style="stop-color:#caf0f8"/>
      <stop offset="100%" style="stop-color:#48cae4"/>
    </linearGradient>
    <!-- Circuit path gradient -->
    <linearGradient id="ai_circuit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <!-- Neural pulse radial -->
    <radialGradient id="ai_core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#caf0f8;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00b4d8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:0"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="ai_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft core glow -->
    <filter id="ai_core_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Title glow -->
    <filter id="ai_title_glow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="160" fill="url(#ai_bg)" rx="6"/>

  <!-- Background grid lines (subtle) -->
  <line x1="0" y1="40" x2="520" y2="40" stroke="#00b4d8" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="80" x2="520" y2="80" stroke="#00b4d8" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="120" x2="520" y2="120" stroke="#00b4d8" stroke-width="0.3" opacity="0.06"/>
  <line x1="130" y1="0" x2="130" y2="160" stroke="#00b4d8" stroke-width="0.3" opacity="0.06"/>

  <!-- ═══ ATLAS AI ICON (left side) ═══ -->
  <!-- Outer ring 1 (orbit) -->
  <circle cx="72" cy="80" r="52" fill="none" stroke="#00b4d8" stroke-width="0.5" opacity="0.15"/>
  <!-- Outer ring 2 (orbit dash) -->
  <circle cx="72" cy="80" r="44" fill="none" stroke="#48cae4" stroke-width="0.5" stroke-dasharray="5,4" opacity="0.2"/>

  <!-- Circuit traces -->
  <!-- Top trace -->
  <path d="M 72 36 L 72 28 L 88 28 L 88 20" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
  <circle cx="88" cy="20" r="2" fill="#00b4d8" opacity="0.7"/>
  <!-- Right trace -->
  <path d="M 116 80 L 124 80 L 124 66 L 132 66" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
  <circle cx="132" cy="66" r="2" fill="#48cae4" opacity="0.7"/>
  <!-- Bottom trace -->
  <path d="M 72 124 L 72 134 L 58 134 L 58 140" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
  <circle cx="58" cy="140" r="2" fill="#0077b6" opacity="0.5"/>
  <!-- Left trace -->
  <path d="M 28 80 L 18 80 L 18 94 L 10 94" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>
  <circle cx="10" cy="94" r="2" fill="#00b4d8" opacity="0.5"/>

  <!-- Inner hexagon frame -->
  <polygon points="72,44 99,60 99,92 72,108 45,92 45,60" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.35"/>
  <!-- Inner hexagon fill (dark) -->
  <polygon points="72,48 96,63 96,89 72,104 48,89 48,63" fill="#060c14" opacity="0.7"/>

  <!-- Neural core glow -->
  <circle cx="72" cy="80" r="22" fill="url(#ai_core)" opacity="0.3" filter="url(#ai_core_glow)"/>

  <!-- Inner circuit nodes (6 around ring) -->
  <circle cx="72" cy="52" r="3" fill="#48cae4" filter="url(#ai_glow)"/>
  <circle cx="93" cy="64" r="2.5" fill="#00b4d8" filter="url(#ai_glow)" opacity="0.8"/>
  <circle cx="93" cy="96" r="2.5" fill="#00b4d8" filter="url(#ai_glow)" opacity="0.8"/>
  <circle cx="72" cy="108" r="3" fill="#48cae4" filter="url(#ai_glow)" opacity="0.7"/>
  <circle cx="51" cy="96" r="2.5" fill="#00b4d8" filter="url(#ai_glow)" opacity="0.8"/>
  <circle cx="51" cy="64" r="2.5" fill="#00b4d8" filter="url(#ai_glow)" opacity="0.8"/>

  <!-- Node connector lines to center -->
  <line x1="72" y1="52" x2="72" y2="68" stroke="#48cae4" stroke-width="0.8" opacity="0.4"/>
  <line x1="93" y1="64" x2="80" y2="72" stroke="#00b4d8" stroke-width="0.8" opacity="0.4"/>
  <line x1="93" y1="96" x2="80" y2="88" stroke="#00b4d8" stroke-width="0.8" opacity="0.4"/>
  <line x1="72" y1="108" x2="72" y2="92" stroke="#48cae4" stroke-width="0.8" opacity="0.4"/>
  <line x1="51" y1="96" x2="64" y2="88" stroke="#00b4d8" stroke-width="0.8" opacity="0.4"/>
  <line x1="51" y1="64" x2="64" y2="72" stroke="#00b4d8" stroke-width="0.8" opacity="0.4"/>

  <!-- Central AI symbol — "A" with circuit style -->
  <!-- Triangle outline (Atlas A) -->
  <polygon points="72,62 86,95 58,95" fill="none" stroke="#caf0f8" stroke-width="1.8" opacity="0.8" stroke-linejoin="round"/>
  <!-- Crossbar -->
  <line x1="63" y1="84" x2="81" y2="84" stroke="#caf0f8" stroke-width="1.8" opacity="0.8"/>
  <!-- Apex dot -->
  <circle cx="72" cy="80" r="4.5" fill="#caf0f8" opacity="0.95" filter="url(#ai_glow)"/>
  <!-- Core pulse rings -->
  <circle cx="72" cy="80" r="8" fill="none" stroke="#48cae4" stroke-width="0.7" opacity="0.45"/>
  <circle cx="72" cy="80" r="12" fill="none" stroke="#00b4d8" stroke-width="0.5" opacity="0.25"/>

  <!-- ═══ TEXT SECTION ═══ -->
  <!-- ATLAS -->
  <text x="156" y="82" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
        font-size="46" font-weight="900" letter-spacing="2"
        fill="url(#ai_title)" filter="url(#ai_title_glow)">ATLAS</text>
  <!-- AI suffix superscript-style -->
  <text x="388" y="65" font-family="'Segoe UI', Arial, sans-serif"
        font-size="22" font-weight="700" letter-spacing="1"
        fill="#48cae4" opacity="0.9" filter="url(#ai_glow)">AI</text>

  <!-- Separator -->
  <line x1="156" y1="89" x2="512" y2="89" stroke="#00b4d8" stroke-width="0.4" opacity="0.3"/>

  <!-- Tagline -->
  <text x="158" y="104" font-family="'Segoe UI', Arial, sans-serif"
        font-size="10.5" letter-spacing="3.2" fill="#48cae4" opacity="0.7">AUTONOMOUS DEVELOPMENT INTELLIGENCE</text>

  <!-- Feature chips -->
  <!-- Chip 1: INDEX -->
  <rect x="156" y="115" width="56" height="18" rx="9" fill="#0a1a2e" stroke="#00b4d8" stroke-width="0.6" opacity="0.8"/>
  <text x="184" y="127.5" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" letter-spacing="1.5"
        fill="#48cae4" text-anchor="middle">INDEX</text>
  <!-- Chip 2: CODEGEN -->
  <rect x="220" y="115" width="68" height="18" rx="9" fill="#0a1a2e" stroke="#00b4d8" stroke-width="0.6" opacity="0.8"/>
  <text x="254" y="127.5" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" letter-spacing="1.5"
        fill="#48cae4" text-anchor="middle">CODEGEN</text>
  <!-- Chip 3: BRIDGE -->
  <rect x="296" y="115" width="62" height="18" rx="9" fill="#0a1a2e" stroke="#00b4d8" stroke-width="0.6" opacity="0.8"/>
  <text x="327" y="127.5" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" letter-spacing="1.5"
        fill="#48cae4" text-anchor="middle">BRIDGE</text>
  <!-- Chip 4: AUDIT -->
  <rect x="366" y="115" width="56" height="18" rx="9" fill="#0a1a2e" stroke="#00b4d8" stroke-width="0.6" opacity="0.8"/>
  <text x="394" y="127.5" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" letter-spacing="1.5"
        fill="#48cae4" text-anchor="middle">AUDIT</text>

  <!-- Bottom accent -->
  <line x1="0" y1="156" x2="520" y2="156" stroke="#00b4d8" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="157" x2="520" y2="157" stroke="#48cae4" stroke-width="0.5" opacity="0.1"/>
</svg>
