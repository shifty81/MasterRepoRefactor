<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="nf_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080f"/>
      <stop offset="40%" style="stop-color:#090d1a"/>
      <stop offset="100%" style="stop-color:#06080f"/>
    </linearGradient>
    <!-- Forge fire gradient -->
    <linearGradient id="nf_fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="35%" style="stop-color:#e67e22"/>
      <stop offset="70%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#f9e4a0"/>
    </linearGradient>
    <!-- Anvil/forge base gradient -->
    <linearGradient id="nf_metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5d6d7e"/>
      <stop offset="50%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#1a252f"/>
    </linearGradient>
    <!-- Title text gradient -->
    <linearGradient id="nf_title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8833a"/>
      <stop offset="40%" style="stop-color:#f5a623"/>
      <stop offset="75%" style="stop-color:#f9e4a0"/>
      <stop offset="100%" style="stop-color:#e8833a"/>
    </linearGradient>
    <!-- Subtitle gradient -->
    <linearGradient id="nf_sub" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="50%" style="stop-color:#88d8d0"/>
      <stop offset="100%" style="stop-color:#4ecdc4"/>
    </linearGradient>
    <!-- Star cluster radial -->
    <radialGradient id="nf_star_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="nf_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft forge glow -->
    <filter id="nf_forge_glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Title glow -->
    <filter id="nf_title_glow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="160" fill="url(#nf_bg)" rx="6"/>

  <!-- Stars (background) -->
  <circle cx="18" cy="12" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="45" cy="25" r="0.5" fill="#4ecdc4" opacity="0.5"/>
  <circle cx="88" cy="8" r="0.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="127" cy="19" r="0.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="175" cy="6" r="0.9" fill="#4ecdc4" opacity="0.6"/>
  <circle cx="430" cy="10" r="0.6" fill="#ffffff" opacity="0.5"/>
  <circle cx="468" cy="22" r="0.7" fill="#4ecdc4" opacity="0.4"/>
  <circle cx="502" cy="8" r="0.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="490" cy="145" r="0.6" fill="#ffffff" opacity="0.4"/>
  <circle cx="510" cy="130" r="0.5" fill="#4ecdc4" opacity="0.5"/>
  <circle cx="12" cy="140" r="0.7" fill="#ffffff" opacity="0.3"/>
  <circle cx="55" cy="148" r="0.5" fill="#ffffff" opacity="0.4"/>

  <!-- ═══ FORGE ICON (left side, centered vertically) ═══ -->
  <!-- Anvil/Forge base shadow glow -->
  <ellipse cx="72" cy="127" rx="34" ry="6" fill="#e67e22" opacity="0.12"/>

  <!-- Forge fire glow (behind hammer) -->
  <ellipse cx="72" cy="95" rx="18" ry="28" fill="url(#nf_fire)" opacity="0.15" filter="url(#nf_forge_glow)"/>

  <!-- Forge flame — central column -->
  <path d="M 65 118 Q 60 102 67 88 Q 72 78 72 70 Q 74 78 76 88 Q 80 100 75 115 Z"
        fill="url(#nf_fire)" opacity="0.85" filter="url(#nf_forge_glow)"/>
  <!-- Flame left tendril -->
  <path d="M 60 115 Q 55 100 60 88 Q 64 80 68 85 Q 63 95 65 112 Z"
        fill="#f5a623" opacity="0.5" filter="url(#nf_forge_glow)"/>
  <!-- Flame right tendril -->
  <path d="M 80 115 Q 87 100 82 88 Q 78 80 75 85 Q 80 95 77 112 Z"
        fill="#f5a623" opacity="0.5" filter="url(#nf_forge_glow)"/>
  <!-- Inner hot core -->
  <path d="M 68 110 Q 66 100 70 93 Q 72 89 73 93 Q 75 100 73 108 Z"
        fill="#f9e4a0" opacity="0.8" filter="url(#nf_glow)"/>

  <!-- Forge body (anvil shape) -->
  <!-- Anvil top horn -->
  <path d="M 44 118 L 54 118 L 56 112 L 44 112 Z" fill="url(#nf_metal)" rx="1"/>
  <!-- Anvil main body -->
  <rect x="44" y="118" width="56" height="12" rx="2" fill="url(#nf_metal)"/>
  <!-- Anvil base wider part -->
  <path d="M 40 130 L 104 130 L 100 138 L 44 138 Z" fill="#1a252f"/>
  <!-- Anvil highlight -->
  <line x1="44" y1="118.5" x2="100" y2="118.5" stroke="#5d6d7e" stroke-width="0.7" opacity="0.7"/>

  <!-- Hammer (striking) -->
  <!-- Hammer head -->
  <rect x="85" y="88" width="22" height="14" rx="3" fill="#5d6d7e" transform="rotate(-20, 96, 95)"/>
  <!-- Hammer face highlight -->
  <rect x="85" y="88" width="22" height="4" rx="2" fill="#85929e" opacity="0.7" transform="rotate(-20, 96, 95)"/>
  <!-- Hammer handle -->
  <line x1="99" y1="98" x2="115" y2="70" stroke="#6b4c2a" stroke-width="4" stroke-linecap="round"/>
  <!-- Hammer handle highlight -->
  <line x1="99" y1="97" x2="115" y2="69" stroke="#8b6342" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Impact spark -->
  <circle cx="90" cy="105" r="2.5" fill="#f9e4a0" filter="url(#nf_glow)" opacity="0.9"/>
  <line x1="90" y1="105" x2="85" y2="99" stroke="#f5a623" stroke-width="1" opacity="0.7"/>
  <line x1="90" y1="105" x2="96" y2="100" stroke="#f5a623" stroke-width="1" opacity="0.7"/>
  <line x1="90" y1="105" x2="84" y2="108" stroke="#e8833a" stroke-width="1" opacity="0.6"/>

  <!-- Orbit ring (space element around forge) -->
  <ellipse cx="72" cy="105" rx="46" ry="14" fill="none" stroke="#4ecdc4" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.25"/>
  <!-- Orbit dot -->
  <circle cx="118" cy="105" r="2.2" fill="#4ecdc4" opacity="0.6" filter="url(#nf_glow)"/>

  <!-- ═══ TEXT SECTION ═══ -->
  <!-- NOVA -->
  <text x="160" y="90" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
        font-size="52" font-weight="900" letter-spacing="-1"
        fill="url(#nf_title)" filter="url(#nf_title_glow)">NOVA</text>
  <!-- FORGE -->
  <text x="160" y="140" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
        font-size="52" font-weight="900" letter-spacing="-1"
        fill="url(#nf_title)" filter="url(#nf_title_glow)">FORGE</text>

  <!-- Horizontal separator line -->
  <line x1="160" y1="97" x2="510" y2="97" stroke="url(#nf_sub)" stroke-width="0.5" opacity="0.3"/>

  <!-- Tagline -->
  <text x="162" y="112" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" letter-spacing="3.5" fill="#4ecdc4" opacity="0.75">SCI-FI SURVIVAL · SALVAGE · BUILD · EXPLORE</text>

  <!-- Bottom accent line -->
  <line x1="0" y1="157" x2="520" y2="157" stroke="#e8833a" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="158" x2="520" y2="158" stroke="#4ecdc4" stroke-width="0.5" opacity="0.12"/>
</svg>
